name: Upload preview deployment manual

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to preview (from a fork or same-repo)'
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: write

jobs:
  preview:
    name: Upload preview deployment
    runs-on: ubuntu-latest

    steps:
      - name: Get PR data
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            core.setOutput('sha', pr.head.sha);
            core.setOutput('ref', pr.head.ref);
            core.setOutput('repo_full_name', pr.head.repo.full_name);
            core.setOutput('html_url', pr.html_url);

      # Create the check and save its ID for later update
      - name: Set "Upload preview deployment" check to in_progress
        id: start_check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const res = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Upload preview deployment',                 // must match branch protection
              head_sha: '${{ steps.pr.outputs.sha }}',           // PR HEAD SHA
              status: 'in_progress',
              started_at: new Date().toISOString(),
              output: {
                title: 'Building preview…',
                summary: 'Preview build started.',
              }
            });
            core.setOutput('check_id', res.data.id);

      - name: Checkout PR HEAD (no persisted creds)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.pr.outputs.repo_full_name }}
          ref: ${{ steps.pr.outputs.ref }}
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.tool-versions'
          cache: npm

      - name: Restore Next.js cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .next/cache
          key: ${{ runner.os }}-frontend-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-frontend-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Upload preview deployment
        id: publish
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          preview_upload_output=$(npm run preview-remote:worker)
          echo "$preview_upload_output"
          preview_url=$(echo "$preview_upload_output" | grep -oP '(?<=Version Preview URL: )https?://\S+' || true)
          if [ -z "$preview_url" ]; then
            echo "Failed to extract preview URL from output." >&2
            exit 1
          fi
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Find Comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        id: preview_url_comment
        with:
          issue-number: ${{ github.event.inputs.pr_number }}
          comment-author: 'github-actions[bot]'
          body-includes: Preview

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          comment-id: ${{ steps.preview_url_comment.outputs.comment-id }}
          issue-number: ${{ github.event.inputs.pr_number }}
          body: |
            :rocket: Preview URL for this PR: ${{ steps.publish.outputs.preview_url }}
          edit-mode: replace

      # Update the same check run with success/failure
      - name: Set "Upload preview deployment" check to success
        if: success()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: ${{ steps.start_check.outputs.check_id }},
              status: 'completed',
              conclusion: 'success',
              completed_at: new Date().toISOString(),
              output: {
                title: 'Preview ready',
                summary: 'Preview: ${{ steps.publish.outputs.preview_url }}'
              }
            });

      - name: Set "Upload preview deployment" check to failure
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: ${{ steps.start_check.outputs.check_id }},
              status: 'completed',
              conclusion: 'failure',
              completed_at: new Date().toISOString(),
              output: {
                title: 'Preview failed',
                summary: 'The preview upload failed. See job logs for details.'
              }
            });